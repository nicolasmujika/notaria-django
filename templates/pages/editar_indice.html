{% extends "base.html" %}

{% block content %}
<section class="panel-funcionario-page">
  <div class="panel-funcionario-container">
    <main class="panel-main" style="grid-column: 1 / -1;">
      <div class="panel-block">
        <div class="panel-block-header">
          <h2>{{ titulo }}</h2>
          <p>Completa o modifica la información del índice.</p>
        </div>

        <form method="post">
          {% csrf_token %}
          <div style="display:grid; gap:16px;">
            {{ form.as_p }}
          </div>

          <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
            <button type="submit" class="panel-primary-btn">Guardar</button>
            <a href="{% url 'gestion_indices' %}" class="panel-secondary-btn">Volver</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</section>
{% endblock %}
