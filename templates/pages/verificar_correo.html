{% extends "base.html" %}
{% block title %}Verificar correo{% endblock %}

{% block content %}
<style>
  .verificar-page{
    min-height: calc(100vh - 120px);
    padding: 48px 16px;
    background: linear-gradient(180deg, #f4f7fc 0%, #eef3f9 100%);
  }

  .verificar-wrap{
    max-width: 520px;
    margin: 0 auto;
  }

  .verificar-card{
    background: #fff;
    border: 1px solid #e3ebf5;
    border-radius: 24px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
    padding: 30px 26px;
  }

  .verificar-card h1{
    margin: 0 0 10px;
    font-size: 2rem;
    color: #0f172a;
    font-weight: 900;
  }

  .verificar-card p{
    color: #64748b;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .verificar-label{
    display: block;
    margin-bottom: 8px;
    font-weight: 800;
    color: #1e293b;
  }

  .verificar-input{
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid #d7e2f0;
    font-size: 20px;
    text-align: center;
    letter-spacing: 6px;
    box-sizing: border-box;
    margin-bottom: 16px;
  }

  .verificar-input:focus{
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
  }

  .verificar-btn{
    width: 100%;
    min-height: 50px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #1f3c88 0%, #2563eb 100%);
    color: #fff;
    font-weight: 800;
    cursor: pointer;
  }

  .verificar-link{
    display: block;
    margin-top: 14px;
    text-align: center;
    text-decoration: none;
    color: #2563eb;
    font-weight: 700;
  }

  .verificar-help{
    margin-top: 12px;
    text-align: center;
    color: #64748b;
    font-size: 13px;
  }
</style>

<section class="verificar-page">
  <div class="verificar-wrap">
    <div class="verificar-card">
      <h1>Verifica tu correo</h1>
      <p>
        Te enviamos un código de 6 dígitos a <strong>{{ email }}</strong>.
      </p>

      <form method="post">
        {% csrf_token %}
        <label for="codigo" class="verificar-label">Código</label>
        <input
          type="text"
          name="codigo"
          id="codigo"
          maxlength="6"
          class="verificar-input"
          placeholder="123456"
          required
        >
        <button type="submit" class="verificar-btn">Verificar cuenta</button>
      </form>

      <a href="{% url 'reenviar_codigo' user_id %}" class="verificar-link">
        Reenviar código
      </a>

      <div class="verificar-help">
        El código vence el {{ vence_en|date:"d/m/Y H:i" }}.
      </div>
    </div>
  </div>
</section>
{% endblock %}
