{% extends "base.html" %}

{% block content %}
<style>
.editar-indice-page{
  background:#f4f6fb;
  min-height:calc(100vh - 140px);
  padding:32px 20px;
}

.editar-indice-container{
  max-width:1100px;
  margin:0 auto;
}

.editar-indice-topbar{
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  margin-bottom:24px;
}

.editar-indice-topbar h1{
  margin:0 0 8px;
  font-size:30px;
  color:#1a1a1a;
}

.editar-indice-topbar p{
  margin:0;
  color:#5f6b7a;
  line-height:1.5;
}

.editar-indice-card{
  background:#fff;
  border-radius:18px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

.editar-form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.editar-form-grid p{
  margin:0;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.editar-form-grid p label{
  font-size:14px;
  font-weight:700;
  color:#334155;
}

.editar-form-grid p input,
.editar-form-grid p textarea,
.editar-form-grid p select{
  width:100%;
  border:1px solid #dbe3ef;
  border-radius:12px;
  padding:13px 14px;
  font-size:14px;
  color:#1f2937;
  background:#fff;
  box-sizing:border-box;
}

.editar-form-grid p textarea{
  min-height:110px;
  resize:vertical;
}

.editar-form-grid p input:focus,
.editar-form-grid p textarea:focus,
.editar-form-grid p select:focus{
  outline:none;
  border-color:#1f3c88;
  box-shadow:0 0 0 4px rgba(31,60,136,0.10);
}

.editar-form-grid p:has(textarea){
  grid-column:1 / -1;
}

.editar-actions{
  margin-top:24px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.panel-primary-btn{
  display:inline-block;
  background:#1f3c88;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:12px 18px;
  font-weight:700;
  text-decoration:none;
  cursor:pointer;
}

.panel-primary-btn:hover{
  opacity:.92;
}

.panel-secondary-btn{
  display:inline-block;
  background:#eef2ff;
  color:#1f3c88;
  border-radius:10px;
  padding:12px 18px;
  font-weight:700;
  text-decoration:none;
}

.helptext{
  font-size:12px;
  color:#64748b;
}

.errorlist{
  margin:0;
  padding-left:18px;
  color:#b91c1c;
  font-size:13px;
}

@media (max-width: 768px){
  .editar-form-grid{
    grid-template-columns:1fr;
  }
}
</style>

<section class="editar-indice-page">
  <div class="editar-indice-container">

    <div class="editar-indice-topbar">
      <h1>{{ titulo }}</h1>
      <p>Completa o modifica la información del índice. Los cambios se reflejarán en la consulta pública de índices.</p>
    </div>

    <div class="editar-indice-card">
      <form method="post">
        {% csrf_token %}

        <div class="editar-form-grid">
          {{ form.as_p }}
        </div>

        <div class="editar-actions">
          <button type="submit" class="panel-primary-btn">Guardar</button>
          <a href="{% url 'gestion_indices' %}" class="panel-secondary-btn">Volver</a>
        </div>
      </form>
    </div>

  </div>
</section>
{% endblock %}
